{% extends "base.html" %}

{% block title %}Login - PotatoDetect{% endblock %}

{% block content %}
<div class="container" style="min-height: 100vh; display: flex; align-items: center; padding-top: 80px;">
    <div class="row justify-content-center w-100">
        <div class="col-lg-5 col-md-8">
            <div style="background: rgba(20, 20, 31, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 40px;">
                <div class="text-center mb-4">
                    <div style="font-size: 2.5rem;">🔐</div>
                    <h4 class="mt-2 fw-bold">Welcome Back</h4>
                    <p class="text-muted" style="font-size: 0.9rem;">Sign in to continue</p>
                </div>
                
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label" style="font-weight: 500; font-size: 0.9rem;">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required
                               style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px 16px; border-radius: 10px;">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label" style="font-weight: 500; font-size: 0.9rem;">Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required
                                   style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px 16px; border-radius: 10px 0 0 10px;">
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('password')" 
                                    style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 0 10px 10px 0; color: var(--text-muted);">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="remember" style="background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1);">
                            <label class="form-check-label" for="remember" style="font-size: 0.85rem; color: var(--text-secondary);">Remember me</label>
                        </div>
                        <a href="#" style="font-size: 0.85rem; color: #8B5CF6; text-decoration: none;">Forgot password?</a>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-2" id="loginBtn">
                        <i class="fas fa-sign-in-alt me-2"></i>Sign In
                    </button>
                </form>
                
                <hr style="border-color: rgba(255,255,255,0.05); margin: 25px 0;">
                
                <div class="text-center">
                    <p style="color: var(--text-muted); font-size: 0.9rem;">
                        Don't have an account? 
                        <a href="{{ url_for('register') }}" style="color: #8B5CF6; text-decoration: none; font-weight: 600;">
                            Create one now <i class="fas fa-arrow-right ms-1"></i>
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', handleLogin);
</script>
{% endblock %}
